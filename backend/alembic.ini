# Alembic 配置（M3）。
# 连接串故意留空：真正的 URL 在 alembic/env.py 里从 app.core.config.settings 读取，
# 保持"配置单一事实来源"（不在 .ini 里再硬编码一遍数据库地址）。
[alembic]
script_location = alembic
# 迁移文件名带时间前缀，按时间排序更直观
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
sqlalchemy.url =

# 日志配置：让 alembic 的输出走 Python logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
